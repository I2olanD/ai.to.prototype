<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>dark-mode fixture</title>
    <style>
      body {
        color: #000;
        background: #fff;
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: #fff;
          background: #000;
        }
      }
    </style>
  </head>
  <body>
    <p>Hello</p>
  </body>
</html>
