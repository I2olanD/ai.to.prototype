<!DOCTYPE html>
<html><head><style>
  .btn { transition: background-color 200ms ease-in-out; }
  .icon { animation-duration: 300ms; animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
</style></head>
<body><button class="btn">B</button><div class="icon"></div></body></html>
